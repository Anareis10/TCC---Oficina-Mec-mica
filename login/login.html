<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="./style/style.css">
</head>

<body>

    <main>
        <section>
            <h2>Login</h2>
            <h4>Insira seu nome:</h4>
            <div class="input-box">
                <input type="text" placeholder="">
                <span>Nome de Usuário</span>
            </div>
            <h4>Insira sua senha:</h4>
            <div class="input-box">
                <input type="password" placeholder="">
                <span>Senha</span>
            </div>
            <div class="lembrar-me">
                <input type="checkbox" id="0312">
                <label for="0312">Lembrar-me</label>
            </div>
            <button class="submit-btn btn__login">Entrar</button>
            <p class="button-cadastro">Não tem uma conta? <a href="cadastro.html"> Crie uma!</a></p>
        </section>
    </main>

</body>

</html>
