<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style/style.css">
    <title>Página Inicial</title>
</head>
<body>
    <header>
        <!--A parte que normalmente fica a logo, barra de pesquisa, etc-->
        <div class="parte_superior">
            <div class="superior__esquerda">
                <img class="Logo__PauloCar" src="./imagens/Logo Paulo Car.png" alt="Logo Paulo Car">
            </div>

            <div class="superior__centro">
                <img src="./imagens/Lupa.png" alt="Botão de pesquisa" class="LupaPesquisa">
                <input class="barra__pesquisa" type="text" name="barra" placeholder="Digite aqui...">
            </div>

            <div class="superior__direita">
                <a class="Login__Cadastro" href="#">Cadastrar</a>
                <a class="Login__Cadastro" href="#">Entrar</a>

                <img src="./imagens/Carrinho de compras.png" alt="Logo Carrinho" class="Logo__Carrinho">
                <img src="./imagens/perfil icone.png" alt="Logo Usuário Padrão" class="container__usuario">
            </div>
        </div>
        <!--Barra Lateral-->

        <section>
            <div class="sidebar">
                <!--Opcões de páginas-->
                <a class="Options__Links" href="./loja.html">LOJA</a>
                <a class="Options__Links" href="./sobre.html">SOBRE</a>
                <a class="Options__Links" href="./agendamento.html">AGENDAMENTO</a>
                <a class="Options__Links" href="./servicos.html">SERVIÇOS</a>
            </div>
            <!--Parte que vai ficar do lado da sidebar (Barra Lateral)-->
            <div class="centro">
                <h1>CUIDADO ESPECIALIZADO</h1>
                <h2>PARA O SEU VEÍCULO</h2>
                <p>SEGURANÇA E QUALIDADE PAULO CAR</p>
            </div>
        </section>
    </header>
</body>
</html>
