<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link rel="stylesheet" href="./style/style_login_cadastro.css">
</head>

<body>

    <main>
        <section>
            <h2>Criar Conta</h2>
            <h4>Coloque um nome:</h4>
            <div class="input-box">
                <input type="text" placeholder="">
                <span>Nome de Usuário</span>
            </div>
            <h4>Crie uma senha:</h4>
            <div class="input-box">
                <input type="password" placeholder="">
                <span>Senha</span>
            </div>
            <h4>Confirme sua senha:</h4>
            <div class="input-box">
                <input type="password" placeholder="">
                <span>Confirme a Senha</span>
            </div>
            <button class="submit-btn btn__cadastro">Cadastrar</button>
            <p class="button-login">Já tem uma conta? <a href="login.html"> Clique aqui!</a></p>
        </section>
    </main>

</body>
